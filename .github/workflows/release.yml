name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 2.2.27"
        required: true
        type: string

permissions:
  contents: write

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use x.y.z format, got: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Build and publish Velopack release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          GITHUB_RELEASE_TAG: ${{ steps.version.outputs.tag }}
          APP_UPDATE_NOTES: |
            ${{ steps.version.outputs.tag }}

            - 自动构建发布。
        run: python tools/build/build.py ${{ steps.version.outputs.version }} --publish-release
